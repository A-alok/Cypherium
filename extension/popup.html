<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg-light: #F7F8FA;
      --text-dark: #0F172A;
      --text-secondary: #475569;
      --color-indigo: #6366F1;
      --color-blue: #3B82F6;
      --color-cyan: #06B6D4;
      --color-emerald: #10B981;
      --color-amber: #F59E0B;
      --color-red: #EF4444;
      --color-pink: #EC4899;
    }

    body {
      width: 340px;
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-light);
      color: var(--text-dark);
      overflow-x: hidden;
      position: relative;
    }

    /* Minimal Background Elements */
    .bg-mesh {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: -1;
      background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.15), transparent 60%),
                  radial-gradient(circle at bottom left, rgba(6, 182, 212, 0.15), transparent 60%);
    }

    .container {
      padding: 20px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      font-weight: 700;
      font-size: 1.25rem;
      letter-spacing: -0.02em;
    }

    .header svg {
      color: var(--color-indigo);
    }

    /* Glass Card */
    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 4px 20px rgba(15, 23, 42, 0.05);
      border-radius: 16px;
    }

    /* Score Container */
    .score-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      margin-bottom: 20px;
      text-align: center;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .score-container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      opacity: 0.1;
      z-index: -1;
    }

    .score-high::before { background-color: var(--color-red); }
    .score-medium::before { background-color: var(--color-amber); }
    .score-low::before { background-color: var(--color-emerald); }

    .score-label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 600;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .score-value {
      font-size: 2.75rem;
      font-weight: 800;
      letter-spacing: -0.05em;
    }

    .score-high .score-value { color: var(--color-red); }
    .score-medium .score-value { color: var(--color-amber); }
    .score-low .score-value { color: var(--color-emerald); }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 5px;
      background: rgba(15, 23, 42, 0.05);
      padding: 4px;
      border-radius: 999px;
      margin-bottom: 20px;
    }

    .tab-btn {
      flex: 1;
      padding: 8px;
      background: transparent;
      border: none;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: #fff;
      color: var(--text-dark);
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.05);
    }

    .tab-content {
      display: none;
      animation: fadeIn 0.3s;
    }

    .tab-content.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Buttons */
    .btn-pill {
      width: 100%;
      padding: 12px;
      border-radius: 999px;
      border: none;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--text-dark);
      color: #fff;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.15);
    }

    .btn-primary:hover {
      background: #1e293b;
      transform: translateY(-1px);
    }

    .scan-button {
      background: var(--color-indigo);
      color: white;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    .scan-button:hover {
      background: #4f46e5;
      transform: translateY(-2px);
    }

    /* Status Area */
    .status {
      margin-top: 15px;
      padding: 12px;
      border-radius: 12px;
      font-size: 0.85rem;
      text-align: center;
      font-weight: 500;
    }

    .status-loading {
      background: rgba(99, 102, 241, 0.1);
      color: var(--color-indigo);
      border: 1px solid rgba(99, 102, 241, 0.2);
    }

    .status-error {
      background: rgba(239, 68, 68, 0.1);
      color: var(--color-red);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .status:empty {
      display: none;
    }

    /* Forms & Inputs */
    .form-input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 999px;
      border: 1px solid rgba(15, 23, 42, 0.1);
      background: #fff;
      font-family: inherit;
      font-size: 0.9rem;
      box-sizing: border-box;
      margin-bottom: 15px;
      transition: all 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--color-blue);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .identity-form {
      display: flex;
      flex-direction: column;
    }

    /* Sections */
    .info-section {
      margin-top: 15px;
      padding: 15px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 12px;
      border: 1px solid rgba(15, 23, 42, 0.05);
    }

    .info-section h3 {
      margin: 0 0 10px 0;
      font-size: 0.85rem;
      color: var(--text-dark);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    #recommendations-list {
      padding-left: 20px;
      margin: 0;
      font-size: 0.8rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    #recommendations-list li {
      margin-bottom: 6px;
    }

    /* Feedback */
    .feedback-section {
      display: none;
      margin-top: 15px;
    }

    .feedback-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .feedback-btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .feedback-btn:hover {
      transform: translateY(-1px);
    }

    .false-positive {
      background: rgba(16, 185, 129, 0.1);
      color: var(--color-emerald);
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .false-negative {
      background: rgba(239, 68, 68, 0.1);
      color: var(--color-red);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .feedback-form textarea {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(15, 23, 42, 0.1);
      font-family: inherit;
      font-size: 0.85rem;
      resize: vertical;
      min-height: 60px;
      box-sizing: border-box;
      margin-bottom: 10px;
    }

    .feedback-form textarea:focus {
      outline: none;
      border-color: var(--color-blue);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    /* Breach Items */
    .breach-item {
      padding: 10px;
      border-bottom: 1px solid rgba(15, 23, 42, 0.05);
      font-size: 0.8rem;
    }
    
    .breach-item:last-child {
      border-bottom: none;
    }
  </style>
</head>
<body>
  <div class="bg-mesh"></div>
  
  <div class="container">
    <div class="header">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
      </svg>
      Cypherium
    </div>
    
    <div class="glass-card score-container score-medium">
      <div class="score-label">Global Safety Score</div>
      <div class="score-value">45<span style="font-size: 1.25rem; font-weight: 600; color: var(--text-secondary)">/100</span></div>
    </div>
    
    <div class="glass-card" style="padding: 15px; margin-bottom: 20px;">
      <div class="tabs">
        <button class="tab-btn active" data-tab="scan-tab">Page Scan</button>
        <button class="tab-btn" data-tab="identity-tab">HIBP Check</button>
      </div>

      <div id="scan-tab" class="tab-content active">
        <button id="scanButton" class="btn-pill scan-button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          Scan Current Page
        </button>
        <div id="status" class="status status-loading">Ready to scan.</div>
      </div>

      <div id="identity-tab" class="tab-content">
        <div class="identity-form">
          <input type="email" id="identityEmail" class="form-input" placeholder="Enter your email...">
          <button id="checkEmailBtn" class="btn-pill btn-primary">Check for Breaches</button>
        </div>
        <div id="identityStatus" class="status"></div>
      </div>
    </div>

    <div id="recommendationsSection" class="info-section">
      <h3>Priority Recommendations</h3>
      <ul id="recommendations-list">
        <!-- Recommendations will be populated here -->
      </ul>
    </div>

    <div id="riskFactorsSection" class="info-section">
      <h3>Risk Profile</h3>
      <div id="risk-factors-summary">
        <!-- Risk factors will be populated here -->
      </div>
    </div>

    <div id="feedbackSection" class="glass-card feedback-section" style="padding: 15px;">
      <h3 style="margin: 0 0 10px 0; font-size: 0.85rem; color: var(--text-dark);">Was this analysis correct?</h3>
      <div class="feedback-buttons">
        <button id="falsePositiveBtn" class="feedback-btn false-positive">False Positive</button>
        <button id="falseNegativeBtn" class="feedback-btn false-negative">False Negative</button>
      </div>
      
      <form id="feedbackForm" class="feedback-form">
        <textarea id="feedbackComment" placeholder="Additional comments (optional)"></textarea>
        <button type="submit" class="btn-pill btn-primary">Submit Feedback</button>
      </form>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
